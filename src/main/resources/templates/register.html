<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>注册 - EzStat</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-card auth-card-wide">
        <div class="auth-header">
            <p class="auth-eyebrow">EzStat</p>
            <h1>创建账号</h1>
            <p class="muted">用户名会自动转为小写，密码需包含大小写、数字和符号。</p>
        </div>

        <div id="registerMessage" class="alert hidden"></div>

        <form id="registerForm" class="form-grid section-gap">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input class="form-control" id="username" name="username" type="text" minlength="3" maxlength="32" placeholder="例如 name" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">邮箱</label>
                <input class="form-control" id="email" name="email" type="email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input class="form-control" id="password" name="password" type="password" minlength="8" maxlength="72" placeholder="至少8位" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">确认密码</label>
                <input class="form-control" id="confirmPassword" name="confirmPassword" type="password" minlength="8" maxlength="72" placeholder="再次输入密码" required>
            </div>

            <div>
                <button class="btn btn-primary" type="submit">注册</button>
            </div>
        </form>

        <p class="auth-footer">已有账号？<a href="/login">去登录</a></p>
    </section>
</main>
<script th:src="@{/js/utils/ui-error.js}" src="/js/utils/ui-error.js"></script>
<script th:src="@{/js/auth.js}" src="/js/auth.js"></script>
</body>
</html>
