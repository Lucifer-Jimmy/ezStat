spring.application.name=ezStat

# SQLite file DB
spring.datasource.url=jdbc:sqlite:./data/ezstat.db?journal_mode=WAL&busy_timeout=5000&synchronous=NORMAL
spring.datasource.driver-class-name=org.sqlite.JDBC

# HikariCP settings
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-timeout=30000

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# validate
spring.jpa.hibernate.ddl-auto= update

# Login security policy
ezstat.security.login.max-failed-attempts=5
ezstat.security.login.lock-duration=10m

# Registration policy (can be changed by admin at runtime)
ezstat.security.registration.open=true

# Bootstrap admin policy
ezstat.security.bootstrap-admin.enabled=true
ezstat.security.bootstrap-admin.username=admin
ezstat.security.bootstrap-admin.email=admin@localhost
ezstat.security.bootstrap-admin.password=${EZSTAT_BOOTSTRAP_ADMIN_PASSWORD:ChangeMe123!}

# Debug SQL Queries
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

